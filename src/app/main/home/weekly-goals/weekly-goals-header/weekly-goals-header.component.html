<div class="weekly-goals-header-container">
  <div class="text">
    <h1 class="card-title">Weekly Goals</h1>
    <h2 class="week-timeframe">{{ startOfWeek() + " - " + endOfWeek() }}</h2>
  </div>
  <button class="edit-button" (click)="editGoals()">
    <img class="edit-icon" src="/images/edit.svg" alt="Edit" />
  </button>
</div>
